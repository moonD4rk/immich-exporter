# GoReleaser builds cross-platform binaries + checksums and attaches them to the
# GitHub Release on every tag. The container image is published separately by
# .github/workflows/release.yml. Validate locally with: goreleaser check
version: 2

project_name: immich-exporter

before:
  hooks:
    - go mod download

builds:
  - id: immich-exporter
    main: ./cmd/immich-exporter
    binary: immich-exporter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
