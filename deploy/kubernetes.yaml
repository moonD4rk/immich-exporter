# immich-exporter on Kubernetes: Deployment + Service + (optional) ServiceMonitor.
# Create the API key secret first:
#   kubectl create secret generic immich-exporter \
#     --from-literal=token=<your-immich-admin-api-key>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-exporter
  labels: { app: immich-exporter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: immich-exporter }
  template:
    metadata:
      labels: { app: immich-exporter }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: immich-exporter
          image: ghcr.io/moond4rk/immich-exporter:latest
          args: []
          env:
            - name: IMMICH_BASE_URL
              value: "http://immich-server.immich.svc.cluster.local:2283/api"
            - name: IMMICH_API_TOKEN
              valueFrom:
                secretKeyRef: { name: immich-exporter, key: token }
            - name: SCRAPE_INTERVAL_SECONDS
              value: "120"
            - name: BREAKDOWN_INTERVAL_SECONDS
              value: "900"
          ports:
            - { name: metrics, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            periodSeconds: 30
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: immich-exporter
  labels: { app: immich-exporter }
spec:
  selector: { app: immich-exporter }
  ports:
    - { name: metrics, port: 8000, targetPort: metrics }
---
# Requires the Prometheus Operator (kube-prometheus-stack). Delete this document
# if you scrape via static config or pod annotations instead.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich-exporter
  labels: { app: immich-exporter, release: kube-prometheus-stack }
spec:
  selector:
    matchLabels: { app: immich-exporter }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 60s
      scrapeTimeout: 30s
